body:
  text: 日東沙門實觀分會觀無量壽佛經疏妙宗鈔下筆序四明沙門知禮述此經義疏人悕淨報故説聽者多矣所稟寶雲師首製記文相沿至今著述不絶皆宗智者豈有不知修心妙觀感四淨土文義者耶良以愍物情深適時智巧故多談事相少示觀門務在下凡普霑緣種方今嘉運盛演圓乘慕學之徒皆欲得旨而修證矣故竭鄙志鈔數千言上順妙宗略消此疏適時之巧非我所能願共有情即心念佛乃此鈔所以作也天禧五年歲在辛酉重陽日下筆故序疏佛説觀無量壽佛經疏鈔此之疏題佛等八字備舉經目皆是所釋唯疏一字是能釋也今之五章釋其八字義稍委悉入文自見若欲預知可陳梗槩經是通號餘是別名今且明別佛説者釋迦化主四辨宣演也觀者總舉能觀即十六觀也無量壽佛者舉所觀要攝十五境也且置能説略明所説能觀皆是一心三觀所觀皆是三諦一境毗盧遮那遍一切處一切諸法皆是佛法所謂衆生性德之佛非自非他非因非果即是圓常大覺之體故起信論云所言覺義者謂心體離念離念相者等虗空界無所不遍法界一相即是如來常住法身依此法身説名本覺故知果佛圓明之體是我凡夫本具性德故一切教所談行法無不為顯此之覺體故四三昧通名念佛但其觀法為門不同如一行三昧直觀三道顯本性佛方等三昧觀袒持顯法華兼誦經觀音兼數息覺意歷三性此等三昧歷事雖異念佛是同俱為顯於大覺體故雖俱念佛而是通途顯諸佛體若此觀門及般舟三昧託彼安養依正之境用微妙觀專就彌陀顯真佛體雖託彼境須知依正同居一心心性遍周無法不造無法不具若一毫法從心外生則不名為大乘觀也行者應知據乎心性觀彼依正依正可彰託彼依正觀於心性心性易發所言心性具一切法造一切法者實無能具所具能造所造即心是法即法是心能造因緣及所造法皆悉當處全是心性是故今觀若依若正乃法界心觀法界境生於法界依正色心是則名為唯依唯正唯色唯心唯觀唯境故釋觀字用一心三觀釋無量壽用一體三身體宗力用義並從圓判教屬頓五重玄義本是經中所詮觀法大師預取解釋經題欲令行者用此觀法入十六門而為修證故於序文以主包衆以正收依觀佛既即三身觀餘豈非三諦寄語行者觀雖深妙本被初心若能進功何憂不就縱未入品為因亦強生至彼得預大會所見依正微妙難思速入聖階度生亦廣永異事善及小乘行得往生者如此土人宿圓修者於諸座席見相殊常聞法易悟以此類彼功在妙宗但為戒福不精無往生願故在穢土聞法入真須懼娑婆不常值佛縱遇善友色心不勝難發我心況塵境粗強誠為險處故須外加事懺內勤理觀正助雙行加願要制必於寶剎速證無生今解觀門其意在此疏者疏也決也疏通決擇上之義趣通而不壅令其行者得意修之故也次能説人號疏天台智者大師説鈔備於別傳及諸章記有未知者須尋彼文二釋文初釋序三初敘經觀意二初正明觀行二初敘意二初對垢立淨二初法二初明二報苦樂疏夫樂之與苦域金寶之與泥沙胎獄之望華池棘林之比瓊樹鈔欲論觀行先示二報苦樂之相文有四句一一皆論淨穢相對初句以所成國土苦樂相對安養淨國但受諸樂故名樂堪忍穢土多受衆苦義言苦域次句以能成物體貴賤相對彼純七珍略言金寶此多衆穢略語泥沙次句以初生受質垢淨相對此土六道具有四生今就人中多從胎藏母食冷熱及飢飽時兒在胎中如處寒熱倒懸山壓地獄之苦故云胎獄彼土九品八從蓮生下品之人雖經多劫大本中説疑心修善生彼胎宮樂同忉利況八九品不生疑惑豈有苦耶是故華池受生即樂次句以生後遊處粗好相對此則荊棘叢林彼則金渠玉樹然此四句雖一一句苦樂相對意則對穢顯彼淨相又復應知四句之文似唯顯示同居二土據下明宗具論四土淨穢之相以後驗此不專同居當知四句一一通於四種淨穢見思輕重則感同居樂苦域體折巧拙則感方便樂苦域次第頓入則感實報樂苦域分證究竟則感寂光樂苦域以例金寶泥沙胎獄華池棘林瓊樹亦復如是一家制立正文與序必不相違但序總示宗文別説是故似異問下三淨土既皆有相則可論於金寶等事寂光之淨已全無相如何可説金寶華池及以瓊樹答經論中言寂光無相乃是已盡染礙之相非如太虗空無一物良由三惑究竟清淨則依正色心究竟明顯故大經云因滅是色獲得常色受想行識亦復如是仁王稱為法性五陰亦是法華世間相常大品色香無非中道是則名為究竟樂究竟金寶究竟華池究竟瓊樹又復此就捨穢究盡取淨窮源故苦域等判屬三障樂金寶以為寂光若就淨穢平等而談則以究竟苦域泥沙而為寂光此之二説但順悉檀無不圓極問佛無上報是即理之事可論金等究竟寂光是即事之理豈有金等若其同有事理既混如何分於二土義耶答佛無上報是究竟始覺上品寂光是究竟本覺始本既極豈分二體應知二土縱分事理實非有無豈真善妙有而非理耶祕藏之理豈同小空故此事理二名一體以復本故名無上報事也以復本故名上寂光理也故妙樂云修得四德本有四德二義齊等方是遮那身土之相況淨名疏顯將寂光為佛依報故知定執報土有金寶等寂光定無斯乃迷名全不知義矣二誠由下明二因心行疏誠由心分垢淨見兩土之升沉行開善惡覩二方之粗妙鈔誠實也由從也報之淨穢實從心行二因致感心即迷了二心行即違順二行六道三教迷三德性為三惑染故曰垢心身口諸業違理有作皆名惡行此之心行感四穢土沉下粗淺也唯圓頓教了三德性離三惑染方名淨心身口諸業順理無作稱為善行此之心行感四淨土高升深妙也心雖本一以迷了故須分垢淨行業雖同以違順故須開善惡從此二因感報淨穢應知圓人以上寂光而為觀體凡聖因位皆即究竟不同別人要心秪齊一十二品故分證穢正在別教問至理微妙不垢不淨無取無捨今立垢淨令人取捨既乖妙理即非上乘何得名為修心妙觀顯一實相答據名求義萬無一得以義定名萬無一失良以理外理內小乘大乘漸次圓頓所立名言率多相似須以邪正定其內外次以空中甄其小大復以漸頓分其別圓則使名言纖毫不濫方可憑之立乎觀行是故今家評此等義而用六句判於同異所謂相破相修相即各有二句即六句也今用此六判此相違先以別義定其同名所謂外道斷無不垢不淨見二乘空理不垢不淨證別教但中不垢不淨門圓教祕藏不垢不淨理復有四淨外道欣厭執淨之見二乘斷惑滅淨之證別教離染漸淨之門圓教即染頓淨之證既知此已乃可論於淨與不垢不淨相破之句圓教頓淨破於別教二乘外道不垢不淨圓教不垢不淨破於三種之淨相修句者三種之淨修於圓教祕藏不垢不淨三種不垢不淨修於圓教即染之淨相即句者圓教即染之淨即是祕藏不垢不淨祕藏不垢不淨即是即染之淨今之妙觀即於染心觀四淨土既照寂光豈異祕藏不垢不淨耶若謂今經捨穢取淨異於祕藏雙非理者何故韋提聞觀淨土分證祕藏耶應知今淨淨於垢淨乃以垢淨平等之理而為於淨名偏義圓斯之謂矣但以機緣捨穢心強宜以淨門淨一切相故今談淨與不垢不淨全不相違又復應知取捨若極與不取捨亦非異轍二喻疏喻形端則影直源濁則流昏鈔形端喻淨因了性淨心順理善行影直喻果四淨土也源濁喻穢因迷性垢心違理惡行流昏喻果四穢土也若翻上喻形曲影凹自可喻於逆修因果若翻下喻源淨流清亦自可喻順修因果今舉二喻各喻一種其義甚明二故知下就淨示修上已對穢顯於淨相故今就淨而明修法前示二因通云淨心及以善行此明修相故的指今十六妙觀三種淨業疏故知欲生極樂國土必修十六妙觀願見彌陀世尊要行三種淨業鈔於十六境不照三諦豈名妙觀修三種福為三惑染不稱淨業妙觀是正淨業為助正助合行能感四種極樂國土得見三身彌陀世尊文從互説觀論生土業論見佛依正既俱正助非隔二然化下示文二初示教興二初明興由疏然化因事漸教藉緣興是以闍王殺逆韋提哀請鈔革凡之化要因近事而為鴻漸詮理之教必藉機緣方得興起近事為漸通於諸化令化別由殺逆之事欲令衆生厭濁世故此教當機是韋提希華言思惟善修觀故二大聖下明現土疏大聖垂慈乘機演法曜玉相而流彩聳珍臺而顯瑞雖廣示珍域而宗歸安養鈔佛是極聖故稱為大佛慈下被名之曰垂託韋提請布所證理名乘機演法曜玉相等者經云爾時世尊放眉間光遍照十方無量世界還住佛頂化為金臺如須彌山雖廣示等者經云十方妙國皆於中現或有國土七寶合成復有國土純是蓮華乃至云時韋提希白佛言是諸國土雖復清淨我今樂生極樂世界阿彌陀佛所二使末下示觀相二初總標疏使末俗有緣遵斯妙觀鈔使末俗等者經云如來今者教韋提希及未來世一切衆生觀於西方極樂世界以佛力故當得見彼清淨國土等二落日下別示十六觀法不出三類即依報正報及三輩往生今順此三撮要而示文自為三初依報疏落日懸鼓用標送想之方大水結氷實表琉璃之地風吟寶葉共天樂而同繁波動金渠將契經而合響鈔初觀落日狀如懸鼓令心堅住專想不移此有二意一令觀日心不馳散二令心想正趣西方故云用標送想之方次觀清水復想成氷良以彼土琉璃為地此地難想且令想氷氷想若成寶地可見故云實表琉璃之地次示樹觀而經但云其諸寶樹七寶華葉無不具足而無風吟天樂之事乃取小本中語成今樹觀之文故彼經云微風吹動衆寶行樹及寶羅網出微妙音譬如百千種樂同時俱作故云共天樂而同繁次示池觀經云有八池水從如意珠王生分十四支黃金為渠其摩尼水流澍華間其聲微妙演説苦空無常無我諸波羅蜜等故云將契經而合響二觀肉下示正報疏觀肉髻而瞻侍者念毫相而覩如來鈔先明觀音勢至二菩薩觀以此二觀皆明肉髻故經云若有欲觀觀世音菩薩者先觀頂上肉髻次觀天冠其餘衆相亦次第觀之勢至經云頂上肉髻如鉢頭摩華於肉髻上有一寶瓶盛諸光明普現佛事餘諸身相如觀世音等無有異斯是如來教示行者想二大士觀法之要也此二菩薩次當補處今為近侍故云瞻侍者也次示彌陀觀經云觀無量壽佛者從一相好入但觀眉間白毫極令明了見眉間白毫者八萬四千相自然當現豈非教示觀法之門故云念毫相而覩如來也三及其下示三輩觀下疏判云觀三品往生有二意一令捨中下修上品故二令識位高下即大本三品故此之二意初策自行次則觀他故今略敘就䇿自行即修觀行人功有淺深致使往生相分三品故云及其瞑目告終等也疏及其瞑目告終上珍臺而高踊文成印壞坐金蓮而化生隨三輩而橫截越五苦而長騖鈔初明上品上生及上品中生以經明上生乘金剛臺中生坐紫金臺故云上珍臺也次文成下明上品下生經云即見自身坐金蓮華文成印壞者大經二十七云譬如蠟印印泥印與泥合印滅文成以喻凡夫現在陰滅中有陰生今借此文以喻往生菩薩此土陰滅彼國陰生須知垂終自見坐金蓮身已是彼國生陰故也成論明極善極惡俱不經中陰如䂎矛離手也上雖三品但是上輩次總示三輩往生之者俱出輪回言隨三輩者非謂隨他蓋是隨己所修三輩行業皆能橫截五道永得不退也大本云往生安養國橫截五惡道五苦者此方五道俱不免苦天道縱樂還墮惡趣故二可謂下結歎觀行疏可謂微行妙觀至道要術者哉鈔微行者歎三種業雖是身口運為之善今順理修皆成無作幽微無相之行妙觀者歎十六觀雖託安養依正之境而皆稱性絶待照之即不思議圓妙觀也此之觀行能令修者達四淨土縱具見思而能不退誠為至極之道要妙之術如此歎結意令聞者尚之修之不肖之徒輕欺生死不求不退於斯要術生謗障人痛哉痛哉二此經下敘經宗體疏此經心觀為宗實相為體鈔心觀者經以觀佛而為題目疏今乃以心觀為宗此二無殊方是今觀良以圓解全異小乘小昧唯心佛從外有是故心佛其體不同大乘行人知我一心具諸佛性託境修觀佛相乃彰今觀彌陀依正為緣熏乎心性心性所具極樂依正由熏發生心具而生豈離心性全心是佛全佛是心終日觀心終日觀佛是故經目與疏立宗語雖不同其義無別又應須了若觀佛者必須照心若專觀心未必託佛如一行三昧直觀一念不託他佛而為所緣若彼般舟及此觀法發軫即觀安養依正而觀依正不離心性故曰心觀須知此觀不專觀心內外分之此當外觀以由託彼依正觀故是以經題稱為觀佛若論難易今須從易法華玄云佛法太高衆生太廣初心為難心佛衆生三無差別觀心則易今此觀法非但觀佛乃據心觀就下顯高雖修佛觀不名為難是知今經心觀為宗意在見佛故得二説義非殊途又應了知法界圓融不思議體作我一念之心亦復舉體作生作佛作依作正作根作境一心一塵至一極微無非法界全體而作既一一法全法界作故趣舉一即是圓融法界全分既全法界有何一物不具諸法如義例中僻解師云四教中圓唯論心具一切諸法身色依報則不論具唯一頓頓方明三處皆具諸法荊溪論曰四教中圓何嘗不云三處具法稟今宗者若云心具色等不具同彼謬立漸圓之見望彼頓頓天地相懸尚劣於彼何預今宗以一切法一一皆具一切法故是故今家立於唯色唯香等義若其然者何故經論多以一心為諸法總立觀境耶良以若觀生佛等境事既隔異能所難忘觀心法者近而復要既是能造具義易彰又即能觀而為所照易絶念故妙玄云三無差別觀心則易縱觀他境亦須約心此經正當約心觀佛也實相為體者心觀之宗方能顯發中道實相深廣之體所以者何若於心外而觀佛者縱能推理但見偏真即如善吉觀佛法身但證小理今約唯心觀佛依正當處顯發中實之體中必雙照三諦具足故云此經心觀為宗實相為體文特於此舉宗體者成前敘觀顯後敘題成前者以敘觀文雖具三觀四土之義語且總略恐失意者謂但敘於同居淨土觀行之意故敘觀畢特示唯心妙觀之宗以顯中道實相之體實相既是常寂光土若謂十六秪觀應佛依正之相豈能顯此實相寂光若於十六用圓三觀尚能感得寂光極樂豈不能感三土極樂以此成前樂金寶等諸文義皆明四種淨土因果也顯後者行人若得此宗體意則知敘題能説之佛所説觀境徒衆依報及以通名如是諸義悉皆圓妙非小非偏方是今經首題名字敘觀敘題兩楹之際示乎宗體其意在茲三所言下敘經題目二初別題疏所言佛説觀無量壽佛者佛是所觀勝境舉正報以收依果述化主以包徒衆觀雖十六言佛便周故云佛説觀無量壽佛鈔七字具含能説所説能觀所觀正文釋名備顯其義今序但明以勝攝劣攬別為總立題之意也以十六境佛境最勝故云佛是所觀勝境蓋十六觀不出依正及以徒主若論依正佛是正報舉正收依則攝日水地樹等六觀也若分徒主佛是化主述主包徒則攝觀音勢至三輩等九觀也故云觀雖十六言佛便周故入正文以圓三觀釋乎能觀以妙三身釋所觀佛佛既總攝餘十五境豈不一一皆是圓妙三諦三觀耶二經者下通題疏經者訓法訓常由聖人金口故言經也鈔儒經講解有茲二訓萬代軌則故訓法也百王不易故訓常也佛經亦然十界咸規三世不易復以由義而釋於經由佛大聖金口宣吐自證之法故名為經法華玄義委解通名當宗學人不可不究佛説觀無量壽佛經鈔二入文二初取義釋題二初標列疏釋經五義名體宗用教相云云鈔注云云者令依諸部明於通釋五章之義妙玄最委故彼文云就通作七番共解一標章二引證三生起四開合五料簡六觀心七會異標章令易憶持起念心故引證據佛語起信心故生起使不雜亂起定心故開合料簡會異等起慧心故觀心即聞即行起精進心故五心立成五根排五障成五力乃至入三解脫略説七重共意如此今疏從略但標五名也二隨釋五初釋名二初標疏第一釋名者鈔二一切下釋二初對通略示二初就三處論通別三初約一化二初釋二初示諸題具通別疏一切衆經皆有通別二名鈔他釋經題皆以經字為能詮教餘字並是所詮之義作此分之甚違佛旨且人法譬皆是名字豈非能詮那得一向屬所詮義經字不可一向屬教如妙經云法華經藏深固幽遠無人能到又云為佛護念植衆德本入正定聚發救一切衆生之心成就四法必得是經疏釋此四是開示悟入佛之知見知見證理名為得經此二豈非以理為經金光明云十方諸佛常念是經豈令諸佛但念於教此例蓋多不能備引故知諸師以能詮所詮釋衆經題失旨之甚今家皆用通別釋題方無所失二通則下明通別今解諸經通別二名俱是能詮俱是所詮良以通別各自具於教行理故勿謂二名但在於教須知通別自在教名行名理名如一別題佛説是教觀即是行無量壽佛是理豈非別教別行別理以此三別對於經字即是通教通行通理今於三中初明教通別二初正明一化疏通則經之一字別則有七或單人法譬或復或具鈔通名者頓説漸説施權開權律論之外皆名為經故稱通也別名者別相乃多今從三種謂人法譬單三復三并具足一以成七別單三者單人如阿彌陀經等單法如大般涅槃經等單譬如梵網經等復三者人法如文殊問般若經等法譬如妙法蓮華經等人譬如如來師子吼經等人法譬具足者如勝鬘師子吼一乘大方便方廣經等以此七別與通合標一代佛法二今經下別指此經疏今經從能説所説人以立名即教別同名為經即教通鈔本論一化言此經者以明七別此屬單人是故言也雖屬單人而人自分能説釋迦所説彌陀以此二人而為別目經同一化故曰通名據有觀字合是人法能從於所以人兼之故略不示然分通別不同廣釋故未委悉二為行下行通別疏為行不同從一乃至無量即行別同會常樂即行通鈔諸經有用一種之行而為別名以對通名經即通行若論別行其數無量卒難説盡今以增數示於行人似可領會一如一行等二如二智等三如三觀等四如四念等五如五根等六如六妙等七如七覺等八如八正等九如九禪等十如十度等乃至百千萬億無量行也此等別行皆趣涅槃究竟四德略言常樂約趣涅槃別行即通故為行經彼釋籤中乃以因果判行通別須知其意非謂至果其行方通欲知意者據各修因名為行別約趣一果此別即通斯乃別時論通通時論別豈唯行爾教理亦然如以機應對教通別佛以一音演説法衆生隨類各得解各解則機別一音則應通各解不離一音一音不妨各解如金光明玄以能詮文字為教通以能詮所以為教別所以即是四悉檀也一一悉檀皆用文字一一文字不離悉檀如以名實對理通別多名不離一實一實不妨多名故三通別皆悉同時悉類樂中管聲之韻約聲則通約曲則別通別二用不相妨礙三理雖下理通別疏理雖無名將門名理理隨於門四四十六即名理別門隨於理即名理通鈔名實相對名即是門乃以四門彰一理也亦是事別而對理通良以諸經多用一事而彰於理得理別名如此經題以無量壽佛名為別理以對通名經則通理若於一化以通別理解經題者莫若四門以為別理四門者有門空門雙亦門雙非門四門名通須分四教所謂三藏教通教別教圓教四教各開有等四門四四乃成一十六門詮於別理成十六理理尚非一那得十六然理無礙能應諸門猶彼虗空其體實非方圓大小以無礙故故能隨彼方圓等物成無量相從無量説即是別理體是一空名為通理無通不別無別不通通別合標成一題目二此約下結疏此約一化以明通別鈔五時之內一一經題皆具通別若不用此教行理判徒分通別全無所以也然無量行會一常樂四教四門同詮一理若專方等未堪此聞乃是預取法華之意跨節而談於佛滅後解釋諸經不約法華寧窮一化二更約下約一題疏更約一題佛説即教觀即是行無量壽佛即是理教行理足任運有通別意鈔一化經目通別二名具教等三關涉既廣思修或難故就即今所解經題明教行理宛然可見此三皆別以對經字即是三通故云任運有通別意欲使行者即此一題就説解教起能觀行見真佛理三更就下約一字雖約一題而涉三名今示一字解行證三悉得具足此復為二初就説字兼含釋疏更就一字説者釋論云所行如所説説即是教如即是理行即是行鈔題中説字最可顯於教行并理故引釋論所行如所説句以示説中含於行理如者真如也如名不異一真覺性物我無殊三際平等契此如理方得心口説行不異故金剛般若云云何為人演説如如不動法華云諸法空為座處此為説法事相解如二物相似以為不異理觀解如二物性一方名不異故釋經如是三藏則以傳佛所説似水傳瓶名曰文如衍教不爾通以二諦相即為如別則唯聞中道為如圓以文字性離為如三教約此方曰文如論就理觀心口理一方得説行如如不異此令説者行契如理也二佛即下就諸字互具釋疏佛即法身觀即般若無量壽即解脫當知即一達三即三達一一中解無量無量中解一鈔佛復本源究竟覺體非寂非照故屬法身觀字即是清淨智慧寂而常照故屬般若無量壽是自在神通照而常寂故屬解脫今將諸字分對三德深有所以所以者何向就一字明教行理雖約説字義具於三既約修辨尚通前教而又未明字字具三故今特用涅槃三德對於諸字乃彰諸字性各具三非前教人所能思説良以三德性本圓融一一互具故直法身非法身法身必具般若解脫直般若非般若般若必具解脫法身直解脫非解脫解脫必具法身般若三德即是教行理三般若是教智在説故解脫是行用從緣故法身屬理是所顯故佛字既是法身之理即具二德及教行也觀字既屬般若之教亦具二德及理行也無量壽既是解脫之行亦具二德及理教也若不然者豈得即一達三即三達一問本以一字具教行理今何得以無量壽三字方具於三則不名為約一字也答以題諸字對三德釋斯是妙談貴在得意欲令行者知三德性遍一切處一字一句一偈一品一部一經一時一化乃至一切依正色心多亦三德少亦三德一塵三德不少剎海三德不大故引華嚴云一中解無量等也若得此意今之妙觀有造修分應色一相可照三身依報一塵寂光土故十六觀皆照三諦其不信者則辜吾祖立茲法矣二於一下約一字以校量三初正校量疏於一字尚達無量義況諸字況一題況一經一切經耶鈔上窮妙旨從廣至狹今校功德從少至多一字尚詮大涅槃理況一切經豈不圓遍二故經下引經證疏故經云若聞首題名字所得功德不可限量鈔如金光明及諸大乘多作此説三若不下結今得疏若不如上解者安獲無限功德耶鈔不明一字圓具三德諸經所説一句一題受持功德無量無邊便成虗設也自非道場得入三昧發旋總持曷能妙説自在若斯二初釋下就別廣明置通釋別也文四初釋佛字二初正約佛名示六即二初翻名標示疏初釋佛者佛是覺義有六種即鈔梵云佛陀華言覺者即説教主別號稱曰釋迦牟尼通號有十今舉第九故標佛也既是極果即究竟覺起信論云覺心初起心無初相遠離微細念故心即常住名究竟覺此覺圓淨無所對待生佛依正鎔融總攝十方三世亘徹無外五住二死盡淨無餘無量甚深永絶思議強名妙覺此之覺義有六種即即者是義今釋迦文乃究竟是圓淨之覺一切凡聖無不全體皆是此覺雖全體是且迷悟因果其相不同故以六種分別此是所謂理是名字是觀行是相似是分證是究竟是然若不知性染性惡所有染惡定須斷破如何可論全體是耶全體是故免於退屈六分別故免於上慢六不離即即不妨六六即義成圓位可辨問所言凡聖全體即佛為即自己當果之佛為即釋迦已成之佛答自己當果釋迦已成二佛之體究竟不別故諸果佛為生性佛迷則俱迷見則俱見故已他佛於今色心皆可辨於六即義也又復應知六即之義不專在佛一切假實三乘人天下至蜣蛣地獄色心皆須六即辨其初後所謂理蛣蜣名字乃至究竟蛣蜣今釋教主故就佛辨以論十界皆理性故無非法界一一不改故名字去不唯顯佛九亦同彰至於果成十皆究竟故蛣蜣等皆明六即二涅槃下就覺廣明六初理即六種即名皆是事理體不二義而事有逆順名字等五是順修事唯理性一純逆修事此逆順事與本覺理體皆不二其逆順名自何而立以知不二事皆合理名之為順其不知者事皆違理故名為逆名字等五若淺若深皆知皆順若初理即唯迷唯逆而迷逆事與其覺理未始暫乖故名即佛所以者何良由衆生性具染惡不可變異其性圓明名之為佛性染性惡全體起作修染修惡更無別體全修是性故得迷事無非理佛即以此理起惑造業輪回生死而全不知事全是理長劫用理長劫不知不由不知便非理佛以全是故名理即佛以不知故非後五即然理即佛貶之極也以其全乏解行證即但有理性自爾即也又理即佛非於事外指理為佛蓋言三障理全是佛又復應知不名障即佛而名理即佛者欲彰後五有修德是此之一位唯理性是也又障即佛其名猶通以後五人皆了三障即是佛故釋此為三初引諸經示即疏涅槃經云一切衆生即是佛如貧女舍寶衆物具存力士額珠圓明頓在如來藏經舉十喻弊帛裏黃金土模內像暗室瓶盆井中七寶本自有之非適今也淨名云一切衆生皆如也寶篋云佛界衆生界一界無別界鈔初引大經迦葉品云衆生即是佛何以故若離衆生不得三菩提故如來性品我者即是如來藏義一切衆生悉有佛性即是我義如是我義從本已來常為無量煩惱所覆是故衆生不能得見如貧女人舍內多有真金之藏家人大小無有知者時有異人善知方便乃至即於其家掘出金藏又云譬如王家有大力士其人眉間有金剛珠與餘力士角力相撲而彼力士以頭觸之其額上珠尋沒膚中都不自知是珠所在其處有瘡即命良醫欲自療治乃至時醫執鏡以照其面珠在鏡中明了顯現等如來藏經十喻者彼經十文一法九喻一是所喻九是能喻以所從能故云十喻一法者經云佛告金剛慧菩薩我以佛眼觀一切衆生貪瞋癡諸煩惱中有如來智如來眼如來身結加趺坐儼然不動善男子一切衆生雖在諸趣煩惱身中有如來藏常無染汙德相具足如我無異於此文後即舉九事以喻其法各有長行重頌一萎華佛身喻二嚴蜂淳蜜喻三粳糩粳米喻四糞穢真金喻五貧家寶藏喻六庵羅內實喻七弊衣金像喻八貧女貴胎喻九焦模鑄像喻弊帛者經偈云譬如持金像行詣於他國裹以穢弊物棄之在曠野天眼見之者即以告衆人去穢現真像一切大歡喜我天眼亦爾觀彼衆生類惡業煩惱纏生死備衆苦又見彼衆生無明塵垢中如來性不動無能毀壞者土模者經偈云譬如大冶鑄無量真金像愚者自外觀但見焦黑土鑄師量已冷開模令質現衆穢既已除相好劃然顯我以佛眼觀衆生類如是煩惱淤泥中皆有如來性暗室下復出涅槃經云如暗室中井及種種寶人亦知有暗故不見有善方便然大明燈照之得見是人終不生念是水及寶本無今有涅槃亦爾本自有之非適今也大智如來以善方便然智慧燈令諸菩薩得見涅槃今文但引暗井具寶以證理即不取人亦知有等文諸喻皆爾須知諸喻理兼圓別若言三障定覆佛性破障方顯此猶屬別若全性成障障即佛性以不思議德障消者則諸喻皆圓方是今文理即之喻故如來藏喻止觀顯別今文顯圓次淨名皆如語尚涉通今須圓解次寶篋下卷勝志菩薩向佛説偈己界及法界衆生界同等己界即心法法界即佛法佛以法界而為體故對衆生界即成三法心生在因佛法在果三無差別故云一界無別界也二此是下就本覺明佛前引諸經雖云即佛猶未的示覺了之相且指三障體全是理今示此理當處照明名為本覺佛義成也此自分二初正宗疏此是圓智圓覺諸法遍一切處無不明了鈔言此是者指上大經衆生即佛諸喻寶物淨名皆如寶篋法界此等皆是本性圓智非三般若融即微妙智不名圓知一切法一一含受一切諸法全法是智全智是法待對斯絶名圓覺諸法諸法乃是生佛依正三際十方此等時處既全是智何有一處一物一塵體不明了然此明了非心意識所能及也故起信論本覺義云心體離念無所不遍等虗空界本性明了既其離念安以情求所謂不思議智照等也勿認六道漏心三乘證智而為本覺明了之相妙覺之覺方是理佛全修在性斯之謂歟二雖五下遮情疏雖五無間皆解脫相雖昏盲倒惑其理存焉鈔情執者云諸有業縛無明惑暗那言衆生即是佛耶故遮之曰雖業至無間而皆當體是三解脫雖見思昏倒而本覺理未始不存惑業全是性德緣了佛性豈可更壞理佛刀不自傷故三斯理下對四事辨理疏斯理灼然世間常住有佛不能益無佛不能損得之不為高失之不為下故言衆生即是佛理佛也鈔世間常住者即十法界三十世間一一皆住真如法位法位常故世相亦常然世本代謝而言常者以一切法即真實性性不改故故名為常若謂遷流不得言常斯謂情見良以生法即性故常住異滅法即性故常即性之常非常無常不可思議言偏意圓故可得云一生一滅無非中道唯生唯住唯異唯滅法華迹門顯所證云世間相常住於道場知己本門乃云如來如實知見三界之相非如非異故知世間即是三界常住豈乖非如非異本迹雖殊不思議一也此理祕妙佛能明見故故云灼然今我智者成祕妙觀雖是肉眼而名佛眼能見祕藏亦云灼然故妙樂云顯露彰灼稱為真祕真祕之理即世相常世相常故衆生即佛此理妙故有佛教化不益一毫空過無佛不損一毫五即得之何足為高理即失之未始暫下對此四事示理佛也二如斯下名字即此至究竟皆修德也須論損益及以高下言名字即佛者修德之始聞前理性能詮名也然有收簡收則耳歷法音不間明昧異全不聞俱在此位簡則未得圓聞齊別內凡尚屬理即以七方便未解妙名豈知即佛此自分二初帶喻示名字二初不聞之失疏如斯之理佛若不説無能知者法華云一百八十劫空過無有佛世尊未出時十方常暗瞑涅槃云於無量世亦不聞有如來出世大乘經名鈔理雖是佛全體在迷佛出不聞經名絶聽此乃却指但理之失也二若佛下聞名之得疏若佛出世方能闡智慧日識三寶之光明開甘露門知十號之妙味因説生解於寶適悅鈔六即辨佛故今名字唯約三寶及十號也無明長夜佛出令曉闡本智日乃識三寶照世光明生死巨關無佛長鎖佛能於此開甘露門令知十號是常住味此光此味乃從衆生心性流出還使衆生解此光味即本性佛因説等者却指貧女舍寶喻也初既不知家有寶藏唯受貧苦因示得知寶雖未掘預生適悅此等法喻皆示於名有識知義能知所知即名字佛二故須下引人明即佛疏故須達聞名身毛皆竪昏夜大朗巨關自闢此名字佛也鈔梵云須達多此云善施亦曰給孤獨涅槃二十七云舍衛有長者名須達多為兒聘婦詣王舍城宿珊檀那舍見彼長者中夜而起莊嚴舍宅乃問當請摩伽陀王耶答云請佛須達初聞身毛皆竪復問今在何處答曰在迦蘭陀精舍須達思念欲見于時忽見光明如晝尋道而出城門自開見佛聞法證須陀洹疏云巨關即城門也今明毛竪即驚覺也聞名生覺即本性佛若論大經追敘昔事方證初果驗聞名時未能解了覺及本性及前科中三寶十號亦涉於小今約跨節取意而談五時示現身相名號説法度人乃至聞者一念微解一一皆是全性起修當處無非本性佛法如前一化增數諸行皆會圓常四教四門唯詮一理不從跨節為消彼文況文出涅槃部已開會故約驚覺示名字佛三觀行即此中觀法異常坐等直觀心性故託他佛而為所緣然是大乘知心作佛佛即是心其觀未成為塵所動始自圓聞觀佛妙境至識次位勤行五悔若未發品此等行人皆屬名字故知名字其位甚長今明對塵即成佛觀其中念念覺知之心名觀行佛此自分二初觀妙色即真法以大小相皆悉周遍故此色身即是真法又二初約一佛二初示始習即心觀相疏觀行佛者觀佛相好如鑄金像心緣妙色與眼作對鈔此是名字升進之位不獨解名能修觀故但未入品非觀行位觀佛相者若此經中八萬相好非羸劣想而可繫緣故須初心先觀落日漸觀地樹及以座像觀既深著方觀勝身今依般舟初心先觀千輻輪相次第逆想至於肉髻三十二種是下品相復從足起可作始行繫心之境不須更以落日為緣若相若好皆依於身身唯金色故云如鑄金像此之色相雖從心想如在目前故云與眼作對言妙色者即是不可思議色也所以者何由此行人已圓聞故知色唯心知心唯色五根所對尚體唯心況想成色豈在心外此色非色非色非非色而能雙照色與非色既離情想故名妙色非由三觀莫見妙色非由妙色莫成三觀境觀相資塵念靡間方能得入觀行位也二開眼下明觀成稱性周遍疏開眼閉目若明若暗常得不離見佛世尊從大相海流出小相浩浩漾漾如大劫水周眸遍覽無非佛界鈔妙心作相妙相發心心心不休成觀入品塵緣莫動佛常現前閉目了然開眼不失在明見佛處暗不忘性無間然佛豈暫闕一一相海莊嚴法身相為大相好為小相觀大發小名為流出劫水雖大止劑二禪佛相遍周稱於法界且以分喻顯於周遍觀行佛眼名曰周眸此眼所觀何處非佛問金光明玄義觀於三道顯金光明似位尚云閉目則見開目則失今觀三身位在觀行因何開閉俱得見耶答彼明性德金光明理此理初住方任運見故於似位猶論得失今帶事定託彼應色觀於三身以其應相凡心可見故理三身雖乃未顯不妨應色先於定合故令開閉皆見佛身如以三觀觀彼落日三觀未成而能開閉皆見於日故雖事理一念同修而理難事易事易故先現理難故後發故般舟三昧以三十二相為事境以即空假中為理觀境觀雖乃同時而修境必先成託境進觀藉觀顯境更進更顯從凡入聖故知彼就趣真無住對似愛頂墮為開閉得失此就應色得成觀行為開閉俱見不知事理難易淺深此相違文何能銷釋二念一下等諸佛二初約一佛等諸佛疏念一佛與十方佛等念現在佛與三世佛等鈔為成觀故不可散緣故以彌陀一佛為境雖觀一佛何異十方雖照現今何殊過未此彰一切不離彌陀良以彌陀是無量之一故能等於一中無量二一身下明諸佛同三法一佛等彼一切佛者以由佛佛同得三法疏一身一智慧力無畏亦然鈔身是法身智慧是般若十力四無畏是解脫亦是三身三涅槃等身智言一者顯於諸佛法報不別應用亦同故力無畏結云亦然同身智一也菩薩因中分破無明分同妙覺所證三法無明破盡則究竟同諸佛三法諸佛三法既其不二是故彌陀三法不少一切諸佛三法不多故言等也二念色下念三身以結示疏念色身念法門念實相鈔色是應身通於勝劣及他受用法門是報身以諸法門聚而為身即八萬四千陀羅尼為髮第一義諦為髻種智為頭慈悲為眼無漏為鼻四辨為口四十不共為齒二智為手如來藏為腹三三昧為腰定慧為足等此諸法門若從所證名為法身今從能證名為報身自受用也實相是法身非不具於一切法門及諸色相讓於能證及垂應故今是所證及以能垂但名實相前論觀法文中但言相好周遍次文乃約三法論等至今結示云念三身應知法門及以實相不離色身舉一即三全三是一法爾相即非縱非橫是故此經第九佛觀經示相好疏名真法不知圓觀此名莫消若觀色身不涉後二便同小外何預妙宗須知此文是結前觀色相周遍已具三身二常運下明即佛疏常運念無不念時念念皆覺是名觀行佛也鈔觀行位人一切時處念佛三觀常得現前故云無不念時言念念皆覺者示即佛義雖是始覺即同本覺非全本覺觀不名中亦得義論始本一合雖非究竟及真似合而亦得是觀行合也若論即字廣雅訓合荊溪云依訓乃成二物相合於理猶疏今以義求其體不二方名為即然其始覺與本覺合雖名為合非二物合正是荊溪體不二義良以始本覺體是一故知六即得名六合理即乃以逆修之覺與本覺合五皆順覺與本覺合六合無非體不二也荊溪有時亦以合名明不二體故不二門云復由緣了與性一合方能稱性施設萬端緣了是始性豈非本修性體一復名為合四相似即今既釋佛乃似本覺良以此位始覺之功尚伏無明全未破故非真本覺唯得名為相似即佛若四十一位分破無明故得分分是真本覺名分真佛至極果位無明既盡本覺全彰故得名為究竟是佛即究竟本覺亦究竟始覺亦是究竟始本一合亦是究竟始本俱忘例前五即皆有四義問名字等五以始對本論合及忘四義稍可唯初理即既全在迷豈有始覺及二義耶答理雖全迷而具三因及五佛性緣了二性豈非本有修因始覺果及果果二種佛性豈非理中究竟始覺理若不具此等始覺名字等五便須別修復何得云全修在性但有即名無即義也自非山教圓位徒施今當相似位中四義文自分二初標釋二初約三身明即佛疏相似佛者念佛相好身得相似相應念佛法門身得相似相應念實相身得相似相應鈔前觀行位常用三觀念佛三身觀覺雖成似覺未發加功不已今本覺三身相似而發與始覺三觀相似相應應是合義合而不忘非妙觀也問於一本覺約何要義顯示三身令人可見答本覺諸法即空假中覺諸法假即相好身覺諸法空即法門身覺諸法中即實相身如此論之其義宛爾更於一覺約寂照説照而常寂自在神通即相好身寂而常照清淨智慧即法門身非寂非照而寂而照即實相身此之二三皆非縱橫不可思議乃是寂覺照覺雙遮照覺全本成始即是相應及俱忘義此位三身即佛義顯是故文中不特言覺示於即佛二相似下約四喻明相似疏相似者二物相類如鍮似金若瓜比瓠猶火先暖涉海初平鈔行人本覺寂照及雙相似而發成相似位三種之覺此覺似真若鍮若瓜比金比瓠此之二物喻始似本如將至火先覺暖氣行欲近海預覩平相此之二事喻於相似近乎分真前二約法論似後二約位論似二水性下勸證二初約事勸疏水性至冷飲者乃知渴不掘井聽説何為鈔本覺清涼其猶冷水似覺飲之知消煩熱名字之人如熱渴者須三觀功掘無明地方得真似清涼之水徒聞此水不施觀功又無事行取水具物守渴而終至極熱處二略舉下引文證疏略舉其要如法華中六根清淨即是其相名相似佛也鈔相似相應功德之相如彼法華六根清淨文雖稍廣其相顯然行者易知故得名要六根同有五種似發所謂肉眼天眼慧眼法眼佛眼肉耳天耳慧法佛耳乃至意根亦有五相此之六五即三相應肉天法六即相好身相似相應慧六佛六即法門實相相似相應以五眼等是不次第相似發故可以對於圓三身也行者能於三觀觀佛六根三德不久相應五分證即即心觀佛託境顯性雖得相似尚屬緣修今則親證屬於真修分破無明起信論中稱隨分覺寂照雙融本覺真佛分分而顯從所顯説名為分真從能顯言名為分證四十一位皆受此名自分二初明初住一代教中圓位顯者唯起信論及華嚴經經説三身初住頓得論明八相初住能垂若此位不論破無明惑安得如此上冥下應故知十向方伏無明初住但能斷於見惑此等經論是漸次教不可與其華嚴起信頓修頓證菩薩一槩是故今立詮中道教論次不次分於別圓今就彼經明分證佛此文分二初約發心明即佛二初約三法明發就初住名示即佛相疏分證佛者初發心住一發一切發發一切功德發一切智慧發一切境界不前不後亦不一時鈔位名發心發本覺心也常寂常照寂照雙融是本圓覺即一而三不發而發故成三發皆言一切者法界無外攝法不遺諸佛衆生色心依正同一覺體全體為緣全體為了全體為正緣因發故了正亦發了因發故緣正亦發正因發故緣了亦發蓋三法圓融發則俱發緣發名功德能資成故了發名智慧能觀照故正發名境界是真性故是所顯故問三德既是一本覺性由證顯發今云一是所顯境界二名能顯功德智慧若是能顯二則是修何得名證本覺三德答其理如是方不思議所以者何三雖性具緣了是修二雖是修非適今有二若非修三法則橫二若非性三法則縱故釋籤明三點不縱橫云雖一點在上不同點水之縱三德亦爾雖法身本有不同別教為惑所覆雖二點在下不同烈火之橫三德亦爾雖二德修成不同別人理體具足而不相收文畢輒出其意別教法身為惑覆者良由不知本覺之性具染惡德是故染惡非二德也故別惑通惑業識事識煩惱結業三乘六道變易分段此等一切迷中二法非二佛性既非佛性乃成定有能覆之惑是故但有法身本覺隨於染緣作上一切迷中之法以是名曰為惑所覆應知覆義不同泥土覆彼頑石既覆但中佛性之理如淳善人一切惡事非本所能為惡人逼令作衆惡故説善人為惡所覆應須還用隨染覺性別緣真諦及以俗中次第別修空假緣了或中邊緣了種種二因或初緣次了或初了次緣次第翻破一切迷法顯於法身本覺之性是故覆理成於縱義圓人不爾以知本覺具染惡性體染惡修即二佛性故通別惑事業識等一切迷法當處即是緣了佛性豈有佛性更覆佛性如君子不器善惡俱能或同惡人作諸惡事則彰己能何覆之有故即二迷以為緣了顯發於正緣了二德體迷而得義當所發元是修德復當能顯雖分修性皆本具故義不成縱言別人理體具足而不相收者亦為不知本覺之性具染惡德不能全性起染惡修乃成理體橫具三法言不相收者以其三法定俱在性皆是所發猶如三人各稱帝王何能相攝是故不知性中三法二是修者二乃成橫圓人不然元知本覺具染惡性故使迷中一切染惡當處即是緣了佛性以此二修顯於一性如一主二臣主攝於臣臣歸於主三德相收亦復如是今初住位所發三法皆性具故發則俱發故云不前不後以此三法二為能顯一是所顯修性宛爾故云亦不一時不一時故非橫不前後故非縱不縱不橫不思議發是故名為初發心住二三智下約三身明佛前以正助二修對性明圓發相今約報智證法起應報應二修對法一性論分證佛從智證法從法起應即非一時三身頓得故非前後不縱不橫復見於此疏三智一心中得得如來妙色身湛然應一切開祕密藏以不住法即住其中鈔從始圓修一心三觀今圓三智一心中得即以此智證得法身智性即色三一體融名妙色身此身湛寂如鑑無情形對像生山毫靡間名應一切三身三德體離縱橫今始發明名開祕藏入理般若名為住此住無住住祕藏中二以普下約被物明佛用二初總示三輪疏以普現色身作衆色像一音隨類報答諸聲不動真際羣情等悅鈔色像即身輪一音即口輪等悅即意輪身名神通輪口名正教輪意名記心輪妙觀察智也輪者轉義亦能摧碾己心證法轉入他心能摧碾他一切業惑此三業應有十界相皆是初住分得佛用二應以下別示十界上明能用種種三業不出十界今分別之先明佛三況出九界疏應以三輪度者能八相成道具佛威儀以佛音聲方便而度脫之況九法界三輪耶鈔佛應三土且説同居化有始終須彰八相大機所見八相難思若應小乘八種皆劣大示出沒如水之波全法界身八皆勝妙小乘生滅體是無常如火燒薪終歸灰斷故兩八相不分而分勝劣宛爾此等皆是果人法則名佛威儀初住能為名之曰具威儀屬身音聲屬口方便是意應以佛界而得度者即為現此三輪相也佛相至高尚能迹示以佛況九現之不難既現九界各具三業然非直現十界而已於一一身復現十界重重無盡以得普現諸身三昧故也二初住下況後位疏初住尚爾況等覺耶是名分證佛也鈔初住始破一品無明分證三身垂形十界其相尚爾況二三住況第十住行向登地至于等覺破惑轉深德用轉廣寧以心口而思説耶良由位位始覺本覺一合俱忘致使體用高廣若此六究竟即一切諸法無不是佛迷故不知故圓實教不順迷情直示一切皆是佛法世間相常衆生是佛不稟教者但有理是全不知是若聞此教於名知是若入五品於觀知是入十信者相似知是四十一位分真知是今登極果究竟證知一切諸法皆是佛法此自分二初據位直明疏究竟佛者道窮妙覺位極於茶故唯佛與佛乃能究盡諸法實相邊際智滿種覺頓圓無上士者名無所斷無上士者更無過者鈔等覺已名滿足方便地菩薩究竟地始覺道窮本覺理極本始既泯無以名焉強稱妙覺大品般若四十二字字字互具諸字功德南嶽用對圓頓教中四十二位初住阿字中四十字對至等覺最後茶字當於妙覺雖一一位皆能遍具諸位功德然是分具今此極位乃究竟具諸位功德故引法華唯我釋迦與一切佛乃能究盡諸法之權實相之實達無明底到諸法邊名邊際智不思議權智也今已究竟故名為滿於種種法證本圓覺不思議實智也此覺極滿名為頓圓復用第七無上士號顯智斷極有惑可斷名有上士等覺位也無惑可斷名無上士即是妙覺斷德究竟名大涅槃更有過者名有上士亦等覺也更無過者名無上士即是妙覺智德究竟名大菩提二約喻稱歎用彼大經月愛之喻十五日月對四十二圓因果位皆智光增惑暗減滅故初之三日對住行向三十位也從初四日至十三日對十地位十四日以對等覺十五日對妙覺位此乃合前三十開後十地若三十三天同服甘露對四十二位皆證常理開前三十位對三十天合後十地用對一天等覺對一妙覺極位次對釋天若四十二字字字互具四十一字對於圓證四十二位位位相收則前後俱開若開示悟入佛之知見對圓真因四十位者前後俱合也疏如十五日月圓滿具足衆星中王最上最勝威德特尊是名究竟佛義鈔今十五日月光既滿即智德圓暗無不盡即斷德極故大師云此之增減日日有之此之智斷位位有之故不更用後十五日邪光減也復以衆星對諸因人月喻果佛最上等言皆是稱歎究竟佛也二佛有下以例諸號明難説疏佛有無量德應有無量號舉一蔽諸華嚴有十萬號又經有萬號三世諸佛通有十號淨名三號以劫壽説不能令盡何況諸號耶鈔圓極之果所有名字一一不虗究竟成就蓋其所召皆真極故以望真因尚帶虗設妄未盡故七種方便一切凡夫悉是虗名一無實義故大經云世諦但有名無實義第一義諦有名有實義佛是究竟第一義故又復應知非別有法名為究竟第一義諦毗盧遮那遍一切處一切諸法皆是佛法是則世間及出世間二死五住至荔多蠢動蜎蜚五無間等若因若果無非圓極第一義諦故此諸名皆實不虗悉是究竟佛之異名是故稱為佛有無量德應有無量名今唯舉佛一名當之故諸大乘明於佛號或增或減皆是四悉赴彼物機今於通號十名之中舉第九佛也淨名經云正遍知如來及佛此三句義大千衆生皆如阿難多聞第一以劫之壽不能盡受隨其宜樂舉此三名以少況多功德無盡
