front:
  text: 觀經疏鈔皇明百松尊宿嘗憫學者尋對之艱而分會焉可謂有裨於觀覽矣然疏鈔之文間加筆削原文不完本旨或差故予素欲改會以存舊文為緣所阻空過年所屬者幸得閒暇終夙昔之志遂鋟於梓以廣其傳云貞享四年歲次丁卯夏四月沙門實觀序凡例八條原本經一卷疏一卷鈔三卷本開疏為二卷藏本開鈔為六卷今悉復舊予會本乃釐為五卷首標佛說觀無量壽佛經疏玅宗鈔會本佛說觀無量壽佛經出自如來兩處演說阿難一時結集疏出自天台口授章安筆記玅宗鈔是四明所述會本乃予所定也百松本標譯人名然疏鈔並無出譯人之科故今不錄百松會本頂格大書者經也低一字者疏也中間分書者鈔也今依藏本並大書但疏與鈔低一字別之科文下有釋科者經文前有懸釋者有總科在前者有子科連後者而其體不一今不敢改作一如舊本但其在前後者各於本處標出格上以使易識焉疏鈔之科百松會本或刪或補或前後移易有亂次失體者故今疏鈔各依其舊鈔中卷辨體科曰分二而下文曰三書家下具明體德故百松改二字作三發起序科曰三而下無第三科目故亦改三作二總科略釋中第二釋科曰二而下文曰三初段下隨科解經故亦改二作三此皆誤字百松為是今從之經疏鈔文字諸本間有異同未詳是否者格上書曰某字一作某字此經疏鈔京吳梓行久矣唯其字句訛謬附疏相違及其妄加己意削去正文使血脈不貫失經大義故特啟大藏梵筴逐一檢對以復其初也然經疏鈔本各函異軸不便觀者今裂鈔附於疏文之下分疏繫於經文之下開科冠於經疏之前貴在一路貫通遊從無阻不亦以便學者乎雖分經附疏冠科繫鈔如此而未敢自許儻哲校其當不以行止可焉萬歷龍飛之癸酉重陽日徑山傳衣庵受菩薩戒弟子真覺謹白
