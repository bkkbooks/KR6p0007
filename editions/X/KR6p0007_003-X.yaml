body:
  text: 日東沙門實觀分會鈔二分文下隨經顯義前取經中名等五義解釋總題總意雖彰別文難顯故須以句節定經文令義顯現總別雖異義無兩塗方知玄義釋此經題復了疏句不顯他義分二初總別科判總科三分別科六章疏分文為三序正流通從如是訖清淨業處序分爾時世尊放眉間光訖諸天發無上道心正說當機益分爾時阿難白佛當何名下訖經流通分序中文二證信發起正說亦二淨業玅觀流通亦二王宮鷲山鈔二初證下隨科解釋三初序分二初證信序即是通序大論云佛將涅槃阿難問佛一切經首當安何語佛答阿難應云如是我聞一時佛在某處某國土與某大眾非獨我法如是三世諸佛經初亦然故知六義即是通序以諸經同故亦名經前序付囑令安故亦名經後序結集者所置故今言證信者令聞者不疑故論第四問曰何不直說般若而言住王舍城答說時方人令人信故言六句者但以詮義究竟為句如佛但一字亦名句也二初標指六句疏初證信序六句如是標於信我聞異外道一時辯息諍佛正明化主王城論住處列眾為同聞鈔如是標於信者釋論第二問曰諸佛經何故初稱如是答佛法大海信為能入智為能度如是義者即是信也若人有信能入佛法無信不入不信者言是事不如是信者言是事如是我聞異外道親承於佛故曰我聞不同外道不稟佛也一時辯息諍者謂機熟受道之時故無諍也釋論云不應無一時佛自言一人出世多人得樂是者何人佛世尊也如是鈔二如是下隨文釋義六初標信疏如是者諸法實相古今不異名如如理而說故為是決定可信故云如是鈔信名忍樂理當言善方忍方樂理當則不異名如言善則無非曰是四教言理皆稱如是而有淺深若其三藏唯就世俗論於不異及以無非通雖即理但在二諦別教知中要先破二唯圓初心即了諸法一一中實當處皆如稱此而談無非曰是故圓望三教皆不如是此經所信雖未開廢而所被機不從偏小故但就圓明於如是決定可信也此句既爾下之五句皆以在圓故通序文通其義亦通而其意別今以別意釋其通文故此云也我聞鈔二我聞下異外道二初正釋疏我聞者表異外道親承有在鈔有在者在於佛也雖釋我聞意多明聞次文明我二我者下料簡二初立難疏我者自在義一切法空無我何故說我鈔我有自在及主宰義凡夫小乘於人法中而著於我今傳圓觀合順二空何得言我二隨俗下通難二初直通疏隨俗假名說我謂見慢名字若無我則無聞若無聞化道則絕為此義故雖知無我為傳化不絕假名說我鈔畢竟空中雖我叵得此空即俗諸我宛然今且約三分別我相橫計主宰名為見我俱生主宰名為慢我隨世流布即名字我阿難尊者至結集時尚破同體見慢之我豈有界內二種我耶為傳化故故順玅俗立名字我二如人下舉譬疏如人以金錢易銅錢及草木等賣買法爾人無笑者故言我聞鈔知無我理如用金錢隨俗立我如易銅錢及草木等一時鈔三一者下辯息諍二初示論釋二初釋一疏一者佛法無有定實之一云何稱一隨俗假說一耳釋論廣破一異也鈔先約真破次隨俗立在文可見釋論廣破一異者論云若一與物一一與物異二俱有過問曰若一有何過答曰若一瓶是一義在在有一處處皆應是瓶則無衣等諸物一中之過既然二中之過云何答若一與瓶異瓶則非一若瓶與一異一則非瓶若瓶與一合瓶名一者今一與瓶合何不名一為瓶是故不得言瓶異一彼文極廣蓋瓶顯可見故以瓶喻時也一則是數時則是體若於數體定執一異則諸惑紛然能離執者則於法解脫斯乃寄於數體一文示離著觀令於諸法皆祛定計即知六事及以諸文皆須離於一異之見也二釋時疏時者有二種一迦羅即短時亦名實時二三摩耶名長時亦名假時鈔此土詮召但直云時天竺二音若云迦羅即是實時云三摩耶即是假時亦如此間心有二稱言智是解心言識是迷心故令依智不依識也外人執時以為實因是故對彼云三摩耶顯時是假若內弟子依時而食護明相等乃言迦羅顯時是實言迦羅短時三摩耶長時者若據論文短時長時並名三摩耶也謂方時離合一異長短等名字出凡人著心是故長短皆假無實今以短長分對二名者恐是大師依建立門巧會論意以依佛制時則生死時短外道執時則生死時長既迴論文必有此意二今不下明今意疏今不論長短假實說此經竟總云一時鈔言不論等者今非界內護明相等故不論實時又非破外執時為實故不論假時長短如前但是眾生機熟佛應說經機應合一之時亦是諦智合一之時故云一時文但從應故云說經豈無機感佛空說法故佛說竟韋提悟訖然一時文義本通深淺今意別在圓機感佛故使凡夫頓入法忍佛鈔四佛者下明化主三初約異名釋疏佛者亦婆伽婆此云有大名聲亦云能破煩惱鈔大論第四以四義釋婆伽婆一能破煩惱二有功德三巧分別能分別諸法總相別相故四好名聲無有得聲名如佛者故今文略出二義新云薄伽梵具六義一自在二熾盛三端嚴四名稱五吉祥六尊貴以多含故不翻舊云婆伽婆訛也二佛者下約三覺釋疏佛者平等開覺故名為佛既能自覺復能覺他覺行備滿鈔佛者下總示既能下別示三覺對迷說自對自說他對因說滿一平等覺對三不同說為三覺三一切下約超因釋疏一切智異外道慈悲異二乘平等異小菩薩尊極名為佛鈔一切智故異外邪癡無緣慈故異小自度三智等故異偏菩薩究竟覺故異諸因位能異不殊對所異故四種分別然釋佛義六即等說其文稍委故今略云在王舍城耆闍崛山中鈔五在者下論住處二初釋住二初會在同住疏在者暫時曰在久停名住一往語耳鈔在暫住久一往分之故非盡理久在暫住有何所妨況靈鷲山如來應身常在其中豈得言暫二住者下約論釋住此經云在大品言住其義不別故引彼論住義釋在分二初標列疏住者四威儀皆為住差別者謂天住梵住聖住佛住也鈔四威儀者謂行住坐臥此之身儀皆住靈鷲而能住法則有四差即天梵聖佛也二天住下解釋疏天住謂六欲天因即施戒善心也梵住從初禪至非想因即四無量心也聖住三乘人因即三三昧也佛住首楞嚴百八三昧十力四無畏十八不共也鈔今四住文乃是盡取論釋住義是知四中皆明因果而所住法正在於因所謂如來以攝物故示現施戒及十善心此即佛以欲天之法住王舍城為物示現四無量心示三三昧即梵法聖法住王城等此皆如來隨他意住若隨自意即以楞嚴至不共等住王城也故普賢觀云釋迦牟尼名毗盧遮那此佛住處名常寂光釋迦遮那既是異名王城寂光畢竟無二故云此佛住處名常寂光今之所住是何境界又應了知若以人法分於能所施戒至于首楞嚴等皆所住法佛為能住若以王城為所住處上之人法皆名能住又據經文但云佛住論應唯就首楞嚴釋而明前三者荊谿二解一從通以趣別從廣之狹也二將勝以攝劣佛住王城必攝欲色及以三乘佛住既勝則無法不住非不住惡為引物故且從善說而於善中就世間善略指定散收一切善故言天梵於出世中略指小大攝一切法故言聖佛他人不明能住心法唯云身住王舍城等則抑極聖同凡夫住況復凡聖各各有於能住之法且如比丘修戒定慧乃以天梵及以聖住住於房舍若破戒者則以地獄住於房舍其有能修一心三觀則所住處即空假中豈非楞嚴為能住法初心尚爾如何果佛唯論身住二王舍下釋處二初各釋城山二初釋城二初翻梵名疏王舍城者天竺云羅閱祇伽羅鈔亦名摩竭提此云不害言此國法不行刑戮其有犯死罪者送置寒林二釋論下解釋三初約諸王治化釋疏釋論解摩伽陀國王有夫人生子一頭兩面四臂人謂不祥王即裂其身首棄之曠野羅剎女鬼名闍羅還合其身以乳養之後大成人力能并國王有天下取諸國王萬八千人置此五山以大力勢治閻浮提閻浮提人因此名王舍城也鈔二又先下約移居免火釋疏又先所住城城中失火一燒一作如是至七國人疲役集諸智人宜應易處即求覓地見此五山周匝如城即作宮殿王於中住故名王舍鈔三又下約畏罪得處釋疏又古昔國王名婆藪厭世學仙妄云天祀中應殺生噉肉身陷地獄其子廣車次復為王自念我父生入地獄今欲出家復畏地獄欲治天下復恐有罪當何處身作是念時空中語言汝行若見難值希有處當作舍住王出畋獵見一鹿走疾如風王便逐之至此山周匝峻固其地平正生草細輭好華徧地茂林華果溫泉浴池皆悉清淨天雨天香奏天伎樂乾闥婆等適見王來各自還去見此靈奇於中起舍故名王舍城也鈔二耆闍下釋山二初翻名疏耆闍崛山者翻名靈鷲鈔二諸聖下解釋三初約聖靈依就釋疏諸聖仙靈依之而住鈔二又名下約山形似鷲釋疏又名鷲頭峯形似鷲鈔三又山下約鷲鳥棲隱釋疏又山南有尸陀林諸鷲食屍竟棲其山鈔二然法下總示法應疏然法身無像實不假地所居為欲利益故隨化身明化主住處耳鈔不言報者報能冥法復能垂應既言法應報在其中三身融玅言且暫分體常相即六與大下列同聞二初標科辯次疏與大比丘眾下列同聞眾也先聲聞次菩薩顯示教中二乘外相為勝菩薩心雖是勝外相無定是故後說也鈔二聲聞下依次解釋二初聲聞眾二初分科示略疏聲聞先標位次列數何不歎德非是無德譯經人略與大比丘眾鈔二與若下隨文解釋二初標位四初釋與疏與者共義一處一時一心一戒一道一見一解脫等皆一故名共也今經與阿難諸大眾同聞故云與也鈔與即共義以七一釋七種一故方成共義若據時判已屬生蘇且從本說七在三藏同感佛時同鹿苑處同別脫戒同一切智心同無漏正見同三十七道同有餘脫昔同七者今日同聞然此觀門佛將阿難及以目連入韋提希後宮宣說大眾未聞至迴靈山阿難具述方得同聞二大義下釋大疏大義有三謂大多勝天王大人所敬故言大徧解內外經書名曰多出九十五種上號為勝此等皆是無學小乘中極故云大也鈔華言大者梵曰摩訶乃含三義謂大多勝故須就本三義釋之大人所歸德量大故梵王師陳如帝釋師迦葉等通內外典識解多故出九十五知見勝故皆無疑解脫故小中極雖標一大義必具三三釋比丘二初標列六義疏比丘者因果六義因名乞士怖魔破惡果號應供殺賊無生鈔因三果三一一主對一釋論下隨要釋三因三若成果三自剋復欲行者効彼修因故釋因三三中初乞士疏釋論淨目問舍利弗乞士者有四種食合藥種植田園名下口食仰觀星宿名仰口食四方巧語名方口食呪術卜算名維口食比丘不作此四名清淨乞士也鈔今舉身子答彼淨目乞士之義須離上下方維之食常行乞食清淨活命故名乞士至果乃成應供德也二怖魔疏怖魔者若發心出家地行夜叉唱飛行空中展轉乃至六天魔王聞之怖畏失人眾也鈔魔主生死在家受欲增長生死出家離染趣向無生是故魔王聞之生怖染欲破戒魔還快樂勤修三學果證無生三破惡疏破惡者能破煩惱九十八使悉皆破斷故名破惡鈔見思二使共九十八名惡名賊修觀推窮名為破惡證智斷盡名為殺賊四眾者下釋眾三初釋通名疏眾者四人已上乃至百千無量一處羯磨作法行籌布薩事理二和無有違諍名和合眾也鈔二一有下釋別相疏一有羞僧持戒無違二無羞僧不持戒不別好惡三無知僧雖不破戒不別輕重二人共諍不能判決默然無言四真實僧謂學無學人鈔三今此下明去取疏今此二僧得共羯磨同聞證信唯取無學人也鈔羯磨通凡故取有羞今此二僧者即有羞真實也論云是中二種僧可共百一羯磨同聞證信尚簡學人前三絕分也千二百五十人俱鈔二千二下列數二初標人合數二初合一千疏千二百五十人者列數也三迦葉兄弟有千弟子優樓此云木瓜林伽耶此云城那提此云江昔共起剎今連枝也鈔二舍利下合二百五十疏舍利弗名翻言珠子亦云身子姓拘栗陀目犍連姓也翻讚頌亦萊茯根或云胡豆二人共有二百五十人鈔二迦葉下常隨所以疏迦葉舍利弗等先並事火翻邪入正艱苦累載都無所獲一遇見佛便得上果感佛恩深常隨侍佛為同聞眾菩薩三萬二千文殊師利法王子而為上首鈔二菩薩眾二初科四文疏菩薩位中有四第一明位第二列數三萬二千人第三標名文殊第四結為上首鈔二天竺下釋二義二初釋位疏天竺云摩訶菩提質帝薩埵此云大道心成眾生鈔二文殊下翻名疏文殊此云玅德以法化人名法王子也鈔二發起序二初對辯不同二初泛舉差別疏二發起序者諸經不同或放光動地微笑入禪自唱位號勸人令問鈔放光如法華經放眉間光照東方萬八千土也動地如大品世尊以神通力大千國土六種震動微笑如報恩經爾時如來熙怡微笑也入禪如金光明經是時如來遊於無量甚深法性也自唱位號如梵網經我今盧舍那方坐蓮臺也勸人令問如涅槃經普告眾生大覺世尊將入涅槃若有所疑今悉可問為最後問也然諸經發起事或兼有之今且各舉一端以明發起之相二今經下正顯今經二初正顯疏今經正以殺父以為發起鈔二何故下釋疑疏何故舉此逆事為發起耶為彰此界極惡令人厭棄親所生子猶尚危害即欲令人同欣淨土下韋提希願為我說無憂惱處不樂閻浮濁惡之世鈔二就中下總科略釋二初分科疏就中為二初爾時下正明殺父次問守門人下明欲害母鈔二問頻下解釋三初問答釋疑二初問疏問頻婆何故遣人說法韋提何故如來自往鈔頻婆韋提皆請弟子赴頻婆請何故唯遣目連樓那至赴韋提何故如來躬親而往二答疏答父願聞法遣入傳授為化義足母求生淨土非佛不開故須自往鈔頻婆國父願聞戒法可遣人授韋提國母機在玅觀須佛親開父母之稱從闍王得二頻婆下預翻名字疏頻婆娑羅此云摸實亦曰影堅韋提希此云思惟阿闍世此云未生怨或婆羅留支此云折指內人將護名為善見也鈔三初段下隨科解經初正明殺父二初分科疏初段為四一頻婆為子幽禁二國太夫人密奉王食以濟王命三漱口畢下聖為說法以潤王心四如是時間下明因食兼由聞法多日不死爾時王舍大城有一太子名阿闍世隨順調達惡友之教收執父王頻婆娑羅幽閉置於七重室內制諸羣臣一不得往鈔二初爾下隨釋四初為子幽禁二初隨釋經文二初師資現事二初釋時處標人疏初爾時王舍太子阿闍世者當佛在王舍城時未生怨者未生之日相師占之此兒生已定當害父鈔經云爾時即當佛在城不遠耆闍山時也前譯阿闍世為未生冤今方釋義處胎之日有冤害相占者預記因以為名二隨順下明順友造逆五初釋惡友名族疏隨順調達惡友教者調達此云天熱亦云天授是斛飯王子是佛堂弟阿難親兄阿難此翻歡喜亦云無染或云欣樂調達有三十相出家誦六萬法聚滿十二韋陀鈔二為利下釋惡友謀術二初從人學術疏為利養故往詣佛所求學神通佛不為說令觀無常自可得道復至舍利弗目連乃至五百弟子所皆不為說取通之法阿難親弟未得他心授與通法調達入山學得五通鈔阿難親弟知取通法自未得通不知其心故授與之二心念下誘人同謀疏心念誰作檀越闍世太子有大王相或自變身作象馬寶於王子前抱持歍嗽復至天上取天華天食鈔作象馬寶以輪王事誑惑闍世作抱持等欲其生愛也三語王下明惡友言教疏語王子言我作新佛汝作新王豈不快耶鈔正教造逆我殺牟尼以作新佛汝殺頻婆以作新王新王新佛共化世間不亦快哉四隨順下明太子造逆疏隨順惡友收執父王鈔闍世受教乃行殺逆五調達下明惡友造逆疏調達破僧舍利目連教化還合推山厭佛密迹金剛以杵擬之碎石迸來傷佛足指華色比丘尼呵之拳打眼出作三逆罪生入地獄鈔調達自造三逆成就復教闍世殺父成就害母加行自行教他五逆罪故生陷泥黎二頻婆下父子前因疏頻婆往日毗富羅山遊行獵鹿空無所獲遇值一仙正坐使人驅逐令去遂勅殺之臨終惡念願我來生還如今日心口害汝鈔被殺仙人生惡念故即來為子胎中已有害父之怨二如此下總結權化疏如此等事皆是大士善權現化行於非道通達佛道眾生根性不同入道有異一逆一順弘道益物示行無間而無惱恚闍王現逆為息惡人令不起逆鈔調達闍世頻婆韋提皆是大權現逆現順利益眾生二夫人奉食疏二明夫人奉食國太夫人名韋提希恭敬大王澡浴清淨以酥蜜和用塗其身諸瓔珞中盛蒲蔔漿密以上王爾時大王食飲漿求水漱口疏王食飲漿求水漱口合掌遙禮請受八戒澡浴清淨三二聖為說法漱口畢已合掌恭敬向耆闍崛山遙禮世尊而作是言大目犍連是吾親友願興慈悲授我八戒時目犍連如鷹隼飛疾至王所日日如是授王八戒世尊亦遣尊者富樓那為王說法鈔三聖為說法二初釋目連授戒二初釋疾至疏目連是佛右面弟子昔為辟支佛剃頭作袈裟願得神通鈔以其宿世事辟支佛今得神通疾至王所二授八下釋戒相疏授八戒者不殺不盜不婬不妄語不飲酒不著華香不觀聽伎樂不上高牀此八是戒不過中食是齋毗曇不著香衣不上高牀同是莊嚴處合為一也鈔初開香衣及上高牀以為八戒齋在八外次合香衣高牀為七不過中食為第八則齋在八內法無增減數有開合皆名為八戒齋也二富樓下釋樓那說法疏富樓那此云滿願子亦滿慈子從父母得名說法第一巧開人心故偏遣之如是時間經三七日王食蜜得聞法故顏色和悅鈔四頻婆下法食延壽疏四頻婆因食聞法遂得多日不死也鈔二次害下明欲害母二初分科疏次害母中為四一為子幽閉二因禁請佛三佛與弟子因請往赴四見佛傷歎請法初中又三一欲害母二二臣諫不聽害三勅內官幽閉鈔二初闍下隨釋四初為子幽閉三初欲害母三初王問在不疏初闍世問守門者王今在不時阿闍世問守門者父王今者猶存在耶鈔二守門下以事實答疏二守門者以事實答時守門人白言大王國太夫人身塗蜜瓔珞盛漿持用上王沙門目連及富樓那從空而來為王說法不可禁制疏三王聞瞋怒時阿闍世聞此語已怒其母曰我母是賊與賊為伴沙門惡人幻惑呪術令此惡王多日不死即執利劒欲害其母鈔三王聞瞋怒二初消經文疏名父為賊母為賊伴即執利劍欲害其母鈔二應殺下釋妨難疏應殺守門人而欲害母者守門有辭王先有勅制諸羣臣不言婦女沙門從空飛入非我能禁王雖貪國殺父猶不違法時有一臣名曰月光聰明多智及與耆婆為王作禮白言大王臣聞毗陀論經說劫初已來有諸惡王貪國位故殺害其父一萬八千未曾聞有無道害母王今為此殺逆之事汙剎利種臣不忍聞是旃陀羅我等不宜復住於此時二大臣說此語竟以手按劒却行而退時阿闍世驚怖惶懼告耆婆言汝不為我耶耆婆白言大王慎莫害母王聞此語懺悔求救即便捨劒止不害母鈔二劫初下二臣諫三初釋勸辭疏劫初已來一萬八千未聞無道害母害母眼見何得言聞謂不忍聞世人傳說不宜住此欲奔他國故云不住有國已來雖有刑罪不加女人況所生母故不住也鈔二以手下釋勸相疏以手按劒却行而退者按劒現威以息王忿也鈔三驚怖下明從勸疏驚怖惶懼者畏懼也耆婆此云固活生時一手把藥囊一手把針筒昔誓為醫能治他病從德立號菴羅女子也是國賢臣賢臣去必國亡也汝不為我者耆婆重諫慎莫害母懺悔求救前也即便捨劒止不害母勅語內官閉置深宮不令復出鈔三勅語下勅幽閉疏勅語內官幽閉深宮鈔二韋提下因禁請佛二初分科疏韋提希被幽閉下第二請佛謂請如來令遣弟子與己相見文為二初明請人次明請法時韋提希被幽閉已愁憂憔悴遙向耆闍崛山為佛作禮而作是言如來世尊在昔之時恒遣阿難來慰問我我今愁憂世尊威重無由得見願遣目連尊者阿難與我相見鈔二韋提下隨釋二初請人疏韋提何故請見目連及以阿難目連是門師阿難佛侍者先恒教誡故偏求見居在深宮不敢偏求內厭惡界願生淨土欲令二人傳意請佛鈔一是門師一是佛侍先常教誡故偏請二人既在深宮故請二人不敢偏一欲傳我意請佛宣說生淨土因請人之意也作是語已悲泣雨淚遙向佛禮鈔二悲泣下請式科云請法即法式也疏悲泣雨淚望佛哀憐遙向佛禮前已禮竟今復重禮表已殷勤鈔三世尊下因請往赴二初分科疏世尊在耆闍下如來現宮不異勝鬘即生此念時佛於空中現也文為五一神通二色身三坐座四眷屬五雨華鈔勝鬘等者勝鬘夫人也即舍衛國波斯匿王女末利夫人所生為踰闍國妃其後父母遣書云佛出我國神通自在普益眾生勝鬘執書對使說偈云仰惟佛世尊普為世間出亦應愍我等速來至此處即說此偈時佛於空中現復說偈讚云如來玅色身世間無與等等今韋提哀請佛即降赴其事相類故云不異未舉頭頃爾時世尊在耆闍崛山知韋提希心之所念即勅大目犍連及以阿難從空而來佛從耆闍崛山沒於王宮出鈔二知韋下隨釋五初神通二初消文疏知韋提希心念者是知他心從崛山沒王宮出顯神通也鈔如來之心寂而常照無數河沙世界眾生若干種心悉知悉見非同小聖作意方知他心及以身如意通皆無記通也二問前下釋妨二初出妨疏問前頻婆請弟子意在如來今夫人亦請弟子意在佛何故前請遣弟子今請自往耶鈔此難重出問不異前答不同彼疏解有二義一闍王與調達殺父如來若躬赴恐世王起怨嫌心為護彼故不得自往二者佛法寄在國王頻婆定死闍世當為國主如來若往者王得國主佛法不行故不得往夫人無此諸事如來自往鈔言二解者一滅即今嫌佛之惡二生以後行法之善何以故若佛入彼頻婆之室即令世王謂佛朋父還謀國政怨嫌既重後不行法故不躬往母無斯事故佛親赴二時韋下色身時韋提希禮已舉頭見世尊釋迦牟尼佛身紫金色鈔三坐百下坐座坐百寶蓮華鈔四目連下眷屬目連侍左阿難侍右釋梵護世諸天在虗空中鈔五普雨下雨華普雨天華持用供養鈔四傷歎請法二初分科疏傷歎請法中有二意韋提見佛下正明請其生處今向世尊下明請往生之因初明供養問往生因次問生處也鈔今向世尊下明請往生之因者即二意中第二請示往生淨土之因經云唯願佛日教我觀於清淨處文也初明供養問往生因者即第一意問往昔生中何罪為因生此闍世惡逆之子應知此二語同意別時韋提希見佛世尊自絕瓔珞舉身投地號泣向佛白言世尊我宿何罪生此惡子世尊復有何等因緣與提婆達多共為眷屬鈔分二初我有下供養問往生因疏我有何罪生此惡子世尊復有何等因緣與提婆達多而為眷屬此經不答餘經說之昔於錠光佛時釋迦為摩納就珍寶仙人學學習既成念欲報恩自惟貧乏于時耶若達欲嫁女時有須摩提求為女壻聰明有智而形貌醜摩納遇見論義須摩提屈在言下耶若達歡喜大賜珍寶以女妻之摩提生忿發誓未來世世常惱為此因緣常觸惱也鈔經自絕瓔珞舉身投地號泣向佛即三業供養絕瓔投地是身號泣是口以二顯意闍世之因已略如前疏今但出調達之緣唯願世尊為我廣說無憂惱處我當往生不樂閻浮提濁惡世也此濁惡處地獄餓鬼畜生盈滿多不善聚願我未來不聞惡聲不見惡人鈔二濁惡下正問生處疏濁惡者濁五濁也一見二煩惱三眾生四命五劫惡者十惡也殺盜婬妄語惡口兩舌綺語貪瞋邪見也三途地獄名泥犂譯云不可樂畜生云旁行從主畜養為人驅使食噉餓鬼飢虗怯畏三千剎土同有此惡故曰盈滿多不善聚惡道因也無人不起故名曰多人常現行殺盜婬等違理枉物為不善積集稱聚也願我未來不聞惡聲不見惡人今向世尊五體投地求哀懺悔唯願佛日教我觀於清淨業處鈔二今向下請往生因疏今向世尊五體投地兩肘兩膝頭頂是為五體也懺摩梵言悔過漢語彼此並舉故云懺悔將果驗因知過去有罪恐償未盡當來更受故須懺悔唯願佛日啟告所求佛能破壞眾生癡闇如日除昏故言佛日教我觀於清淨業處序文竟鈔第二正說分二初泛科懸解二初科三段疏爾時世尊放眉間光下第二正說文為三初明淨業次辯玅觀三利益鈔二如來下解初文疏如來眉間有白毫相猶如珂雪長一丈五尺毫有八楞周圍五寸其毫中空右旋宛轉如琉璃筒從此發光照無量國還住佛頂變為金臺廣現諸國令韋提希樂生安養鈔二初放下重科廣釋二初總別分科疏初放光酬前請於生處次世尊微笑下酬前淨業近答思惟正受三種淨業散心思量名曰思惟十六正觀說名正受就初有二第一答其生處唯願下明見淨土更請淨國之因初放光普示諸土次或有下示土差別韋提下示生處鈔酬前生處者前韋提請云唯願為我廣說無憂惱處佛今放光照其淨土令彼見之以酬前請酬前淨業者前請云唯願教我觀於清淨業處今示三種淨業十六玅觀即教彼觀淨業處也近答等者以韋提希於酬生處中因光見土乃再請云教我思惟教我正受此在正宗故云近答若酬序中所請即是遠答二隨科解釋二初酬二問二初酬前生處二初答其生處三初爾時下放光普示爾時世尊放眉間光其光金色徧照十方無量世界還住佛頂化為金臺如須彌山十方諸佛淨玅國土皆於中現鈔二或有下示土差別或有國土七寶合成復有國土純是蓮華復有國土如自在天宮復有國土如玻𭹳鏡十方國土皆於中現有如是等無量諸佛國土嚴顯可觀令韋提希見鈔三時韋下的示生處時韋提希白佛言世尊是諸佛土雖復清淨皆有光明我今樂生極樂世界阿彌陀佛所唯願世尊教我思惟教我正受鈔二思惟下見土更請因疏思惟是願願思是業正問其因正受者非邪曰正領納名受即第二問觀行鈔此請淨土正助二因初教我思惟若不思惟不成願樂有願之思乃成業因唯願世尊教我修於淨土願思令成業因此請事善助道之業也次教我正受離邪倒想領納所緣名為正受此請世尊教我修行淨土觀法即正觀也二微笑下酬前淨業二初總別分科疏微笑中有二初明三種淨業答思惟汝是凡夫下次明十六玅觀答正受初業共凡夫次共二乘後是大乘不共之法初淨業中有三第一明三種淨業告阿難下第二歎其所問玅契佛心從阿難汝當受持下第三略付阿難令持獲利也就初復三初明光照頻婆獲道次世尊告韋提汝今知不下舉果勸修因三欲生彼國者下明往生之因也鈔初業共凡夫等者今三種福是圓助道與正觀合皆如來行故云三世諸佛淨業正因但以三種有通有局初孝養等通於大小及以博地故云初業共凡夫次歸戒等唯通大小凡夫無分故云次共二乘若菩提心等專在大乘不通凡小故云不共之法爾時世尊即便微笑有五色光從佛口出一一光照頻婆娑羅王頂爾時大王雖在幽閉心眼無障遙見世尊頭面作禮自然增進成阿那含鈔二何以下隨科解釋二初三種淨業答思惟三初正明淨業三初光照頻婆得道二初釋微笑二初問疏何以不直答其土因而復放光微笑耶鈔二答二初解有下答放光疏解有二初為欲增道次欲使王與夫人因光相見王既覩光增道知國非實視死如眠夫人見王無憂觀法成果也鈔觀法得果者無生法忍是圓三觀習果故也二微笑下答微笑疏微笑如釋種被誅如來光色益顯正以如來善達因緣業報無差對至叵避王雖應死而獲道跡夫人幽縶即是現淨土之緣有此多緣所以致笑也鈔惡業之報害命縶身而為獲果及淨土緣如來心了善惡因果交互萬差欲表內心是故微笑二阿那下釋阿那含疏阿那含者第三不還果也爾時世尊告韋提希汝今知不阿彌陀佛去此不遠汝常繫念諦觀彼國淨業成者我今為汝廣說眾譬亦令未來世一切凡夫欲修淨業者得生西方極樂國土鈔二去此下舉果勸修因二初問疏去此不遠者安樂國土去此十萬億佛剎一一剎恒沙世界何言不遠鈔大本小本俱云極樂去此十萬億剎剎即大千故云河沙何言不遠二解云下答有二意疏解云以佛力故欲見即見又光中現土顯於佛頂一念能緣言不遠也鈔初以佛力故令修觀者欲見即見故此文云汝當繫念諦觀彼國故知佛力加欲見者令觀成見後文云一切眾生觀於西方極樂世界以佛力故當得見彼清淨國土故般舟見佛而論三力一佛威力二三昧力三行者本功德力次意即是光中現土即目覩見也其二種見皆由感應雖遠而近然若心性不具塵剎則佛無應現之理生無感見之功故此經談是心是佛觀迷此意則非玅宗欲生彼國者當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三歸具足眾戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者如此三事名為淨業佛告韋提希汝今知不此三種業乃是過去未來現在三世諸佛淨業正因鈔三第一下正示往生因二初正示三初共凡夫業疏第一孝養父母奉事師長敬上接下慈心行也修十善業是其止行身除三邪口離四過意斷三惡也鈔此經正被頓修之機雖修佛行父母師長豈不孝事輪王十戒豈不止行但能修之心一一稱性何妨所修慈孝之善共於凡夫二第二下共二乘業疏第二三歸者佛法僧也在家戒亦即是十戒具足眾戒者道俗備受微細不犯威儀者三千悉皆不缺也鈔圓頓行者豈違小乘出家之式三歸眾戒威儀等事但受持之心合於一體依於畢竟而所行之法共於二乘三第三下大乘不共業疏第三發菩提心是願起意趣向名為發心菩提是道佛果圓通說為菩提讀誦大乘明修解也行能運通說之為乘餘二不及是言大也鈔依無作境起無緣誓名發菩提心實相不二而二立因果殊二而不二始終理一信此因果方名為深讀誦大乘修三智解運圓乘行以此解行教其行者名為勸進此三種業得前前者不得後後得後後者必得前前故今行人能修前二前二不能修於大乘故云餘二不及是言大乘二佛告下結歎疏佛告韋提此三種業三世諸佛淨業正因是歎辭也鈔既是佛業驗是圓修故大經中復有一行名如來行雖云一行而具五行今亦如是雖是佛業而具三種佛告阿難及韋提希諦聽諦聽善思念之如來今者為未來世一切眾生為煩惱賊之所害者說清淨業善哉韋提希快問此事鈔二諦聽下歎其所問疏諦聽諦聽善思念之諦聽令生聞慧善思思慧念之修慧煩惱賊者此能損慧命傷法身故名為賊也鈔諦聽等者諸經誡聽皆有此語莫不令人生於三慧而須按教明慧偏圓能聽所聽能思所思能念所念若作生滅解者即三藏三慧無生解者通教三慧無量無作別圓可知今令韋提等生圓三慧若不爾者安能此座即證法忍阿難汝當受持廣為多眾宣說佛語如來今者教韋提希及未來世一切眾生觀於西方極樂世界以佛力故當得見彼清淨國土如執明鏡自見面像見彼國土極玅樂事心歡喜故應時即得無生法忍鈔三即得下略付阿難疏即得無生忍是初住初地仁王經說五忍一伏二信三順四無生五寂滅鈔經如執明鏡等者觀法如鏡修之如執觀成土現如見面像是知外有三種淨業內備十六玅觀乃得見也此雖略付淨業意說玅觀初住初地者圓住別地俱破無明是無生忍位玅玄一實位云若入初住正破無明是明圓教無生忍位今意在圓引仁王五種忍位者用顯無生居三忍上若依別教十信伏忍十住信忍十行去順忍十地無生忍玅覺寂滅忍若約圓位五品伏忍六根清淨信順二忍初住至等覺名無生忍玅覺名寂滅忍然別初地即圓初住故引仁王以證今位行者應知如來將說十六觀法預彰所說是圓玅觀故云一切眾生觀於極樂觀成即得無生法忍是故韋提聞說十六隨語觀成說說即證此之玅位經示此觀是取初住徑捷之門故不可云想事而已二初明下明十六玅觀答正受二初分科疏初明韋提見土之由次一問答明為未來眾生請見土之方法佛告韋提希汝是凡夫心想羸劣未得天眼不能遠觀諸佛如來有異方便令汝得見鈔二汝是下隨釋二初明韋提見土之由疏汝是凡夫彰其分齊不能遠觀韋提實大菩薩此會即得無生忍示同在凡夫心想羸劣未得天眼不能遠照見彼國土有異方便令汝得見異方便者即十六觀非直觀名方便以佛力故見彼國者亦是方便也鈔經未得天眼等者問阿那律天眼最勝但見大千豈有得天眼者越十萬億土見安養乎答此語未得分真菩薩天眼非二乘也故大經二十二云菩薩所得清淨天眼異於聲聞緣覺所得以是異故一時徧見十方世界現在諸佛大論亦同此說韋提實大菩薩者此顯韋提本住法身為欲發起淨土觀法故示同凡此會即得無生忍者即者方將也此會聞觀將證法忍非謂前文說無生忍是韋提證前文乃是通說未來眾生修十六觀能得無生人見示同凡夫之言便謂前文是韋提證須知即得非已得也既云實大菩薩乃是久證無生如來據迹言是凡夫心想羸劣劣想凡夫修之得忍顯茲玅觀能革下凡頓成圓聖異方便者十六觀法奇異方便也故起信論云修多羅說有勝方便繫念極樂令生彼國非直觀名方便者謂彼依正有二方便能令此土凡夫得見一者修觀正受方便令心眼見二佛神力示現方便能令目擊既得見之由有其二種故云非直觀去聲名方便佛力令見亦是方便韋提乃得二種之見一者將有隨文作觀之見二者已蒙佛力示現見也故云韋提見土之由時韋提希白佛言世尊如我今者以佛力故見彼國土若佛滅後諸眾生等濁惡不善五苦所逼云何當見阿彌陀佛極樂世界鈔二韋提下為未來請見土之法二初請疏韋提白佛如我今者下為佛滅後眾生請也濁者五濁不善者十不善五苦者五道非樂故云五苦或是五惡五痛五燒五惡殺盜邪婬妄語飲酒如大經現遭厄難王法刑罰是五痛也五燒即當來墮三途苦毒名五燒云何當見阿彌陀極樂國土正為啟請鈔韋提先令示現方便而為請由是故經云如我今者以佛力故見彼國土然復正請觀法方便乃以眾生而為請緣故經云若佛滅後諸眾生等濁惡不善五苦所逼云何當見極樂世界五苦者疏有二釋初以五道非樂釋二以五罪招報釋初釋者地獄燒然苦餓鬼饑虗苦畜生屠割苦人間八種苦天上五衰苦次釋者聖意多含更明五惡招於二報名出大本無量壽經今云大經是也疏文先列三五之名次五惡下釋出三五殺至飲酒五惡因也如大經下釋五痛即華報也五燒下釋五燒即果報也然其二報並無五相各稱五者皆從五種惡因而立故彼五文後皆結云是為一大惡一痛一燒乃至總云五大惡五痛五燒故知二五皆從因立二答二初列觀分科二初列觀疏答中有十六觀一日觀二水觀三地觀四樹觀五池觀六總觀觀一切樓地池等七華座觀八佛菩薩像觀九佛身觀十觀音觀十一勢至觀十二普往生觀十三雜明佛菩薩觀十四上品生觀十五中品生觀十六下品生觀鈔義例云夫三觀者義唯三種一者從行唯於萬境觀一心萬境雖殊妙觀理等如觀陰等即其意也二約法相如約四諦五行之文入一念心以為圓觀三託事如王舍耆闍名從事立借事為觀以導執情如方等普賢其例可識問今十六觀於三種中屬何義耶答既不撮乎法相入心成觀信非附法又非借彼事義立境立觀驗非託事明矣如來直談十六觀行修證之門正當從行也問義例三種皆是理觀今之十六歷依正事何預三種耶答託事附法二種三觀有事有理且置未論從行三觀以何義故不得歷事既言從行必四種行常坐一種縱直觀理餘三三昧豈不兼事如般舟三觀歷念佛事方等三觀歷持呪事法華三觀歷誦經事請觀音三觀歷數息事覺意三觀歷三性事此等歷事若非從行攝屬何耶般舟三昧初觀足下千輻輪相次第逆緣至肉髻相彼觀相時即用三觀彼是從行今那獨非況義例云唯於萬境觀一心豈今依正不唯一心經文具列十六境相大師但於首題示圓三觀令將此觀觀十六境正是萬境雖殊玅觀理等又今三觀并諸歷事三觀若非從行等者那云三觀義唯三種問今經但於像觀示云是心作佛是心是佛諸文皆無觀理之語則知佛外皆是事觀縱將此義例觀十五斯是行人用理觀意據經現文但是事觀答若自依經修觀入證何須四依解說經意製立觀法大師深得佛旨故於首題以玅三觀釋能觀觀以玅三身釋所觀佛而云觀雖十六言佛便周今依大師用三玅觀觀十六境豈是行人自用觀意應知四種三昧無不於事觀三諦理但般舟等依定散善事覺意縱任善惡等事是故偏得歷事之名若常坐等直於三道之事而觀三諦不兼修善及縱惡事故受理名今經觀法豈可異於四三昧耶故知十六正是從行歷事觀理也應知十六皆用三觀為想相之法三觀微故且觀落日及以清水三觀漸著乃觀地樹座像佛身下去諸境皆須三觀二就十下分科疏就十六觀分文為三初六觀觀其依果次七觀觀其正報後三明三輩九品往生也鈔以十六觀三類分之六屬依報者日標送想之方氷表琉璃之地雖此土物意顯彼是故六觀皆彼依報七屬正報者座為三聖親依像類三聖真體是故七觀皆名正報三輩之人自此之彼修因託質事相不同是故此三自為一類二第一下隨科解釋三初六觀觀依報六初日觀二初立意分科疏第一日觀示令繫心佛告下略明繫念總勸修觀云何下正明作日觀一切有目皆見日沒下舉所觀境當起想下正教觀察是為下結也鈔先作日觀意令繫心凡心暗散何能明見淨土玅境故令專想落日之形一事繫心想之不已其心則定心若靜細種種觀法皆可造修繫心之法須落日者欲令定想趣於西方是向彌陀所居處故二隨科解釋二初佛告下總勸修觀佛告韋提希汝及眾生應當專心繫念一處想於西方鈔經韋提希汝及眾生者韋提希等是現在機一切眾生是未來機故知修觀不專佛世況復韋提是發起者正為今人請正受法是故我佛勸眾生修修法如何專繫一處所謂西方二云何下正明日觀三初舉所觀境云何作想凡作想者一切眾生自非生盲有目之徒皆見日沒鈔經文意者謂昔曾見者或現前見日欲沒相為所觀境蓋以此觀所被周徧唯除生下雙目俱盲既不識日故莫能想若曾有目即今盲者亦可修之況現有目見日分明修之越易即以所見落日為境想之令起觀中之日二當起下正教觀察當起想念正坐西向諦觀於日欲沒之處令心堅住專想不移見日欲沒狀如懸鼓既見日已閉目開目皆令明了鈔釋題觀字明玅三觀題目是總經文是別豈不以總而貫於別今想落日而能想之觀隨解而進三藏事定能想所想無非生滅通教事定能想所想皆如幻化別知能想元是佛性於想能所次第觀中圓人玅解知能想心本具一切依正之法今以具日之心緣於即心之日令本性日顯現其前斯乃以法界心緣法界境起法界日既皆法界豈不即空假中圓人六根常所觸對尚須念念即空假中豈今修觀頓廢此三此猶總示若別論三觀成日功者以根境空寂故心日無礙以緣起假立故累想日生以其心日皆法界故當處顯現此之三觀同在一心非一非三而三而一不可思議以其圓人凡修功行皆悉如是若不爾者非是圓人修事觀也通人必以如幻之心修諸事定以驗圓人用即中心成其事觀既以玅心觀於落日此心堅住能於本性顯現日相不唯閉目能見開目亦皆明了若如此者則日觀成也疏出二義二初教令下除疑疏教令正觀為除疑心大本所明以疑惑心修諸功德生彼國者落在邊地復受胎生故作此觀令除疑惑也鈔大本下卷云若有眾生以疑惑心修諸功德願生彼國不了佛智修習善本願生其國此諸眾生生彼宮殿壽五百歲常不見佛不聞法不見僧於彼國土而受胎生此人宿世無有智慧疑惑所致乃至生彼宮殿無有一念惡事但於五百歲中不見三寶故作此觀令除疑惑者經云不了佛智則生疑惑疏云故作此觀令除疑惑即顯此觀能了佛智若其不用一心三觀觀落日者則迷佛智那名此觀能除疑惑日觀既爾餘觀例然故知大師依乎佛智立今觀法然十六觀屬頓教故原始要終皆用佛智若凡小善乃於臨終迴向佛智作眾惡者須依佛智求滅罪障此等亦名了於佛智不生疑惑既有乘種生彼速得見佛聞法預於海眾不生邊地及胎宮也二障者下滅障即五逆重罪也疏障者大本言唯除五逆誹謗正法故須作觀五逆重罪除六十劫生死罪等下輩自論鈔彼經散善力弱故逆謗不生故彼經云若有眾生聞其名字信心歡喜乃至一念至心迴向願生彼國即得往生住不退轉唯除五逆誹謗正法若依今經修正觀者下至日想即能滅除五逆重罪是知逆罪得生必由修觀下輩自論者下品下生觀云除八十億劫生死之罪今言六十者恐六字誤問既用法界以為心境顯法界日令閉目開目常得見日即是觀行見法界理當中三品今何判位在名字初屬下下品答理觀事定相即修者心雖不二事雜凡情故未伏惑事定可成理觀忘情伏惑方發故別惑初伏名觀行位見法界理深伏乃名相似位見分斷方得真見法界今之行者觀日觀氷及觀琉璃雖用法界心境而觀而惑全未伏凡情尚濃方得名字見法界日非觀行位作此判者蓋約鈍根於日等觀且得定心假想之益故在名字也若利根者法界日顯便能圓伏及任運除二種麤惑豈非日觀歷九品耶問今用理解想日現前縱未斷惑事定已成據下經說下下品人以苦逼故不遑念佛但十念頃稱彼佛名心雖相續終不可類見日定心因何同在第九品位答彼由造逆及作眾惡臨終苦逼得遇善友為說玅法雖不能念彼佛三身怖地獄故苦切稱名具足十念既絕後惡即乘此念託彼蓮中名下下品今論始行樂習三昧親善知識聞法了心本具淨土依正諸法標心具修十六觀法故先觀日令心堅住望後諸觀此當末品彼人雖即不成事定而能十念稱佛不散亦為定攝復兼臨終勇決之力故得預於第九品也是故行相雖少不同品位無別三是為下結是為日想名曰初觀鈔二水觀二初分科疏第二水觀初作水想者舉所觀境界從見水澄清下正起觀行是為水想下結觀也一作水想二變水成冰三變冰為瑠璃四觀瑠璃以成大地內外映徹鈔二隨釋三初舉所觀境次作水想鈔即以曾見大陂池水為所緣境二見水下正明起觀既稟圓宗知能想心具七大性故以具水之心託彼即心之水觀於本性令水現前并及諸相皆於心性觀令顯現經文為四初作水想見水澄清亦令明了無分散意鈔玅心既運性水即生專想澄清令心不散二既見下變水成冰既見水已當起冰想鈔性具之法轉變自由故可令水而作堅冰三見冰下變冰為瑠璃見冰映徹作瑠璃想鈔冰想若成瑠璃可識四此想下觀瑠璃成地心藏具法有何邊涯無玅觀緣隱而不發今依佛語順性想之寶地光明種種奇相隨心出現此自六段初成地瑩徹此想成已見瑠璃地內外映徹鈔二下有下寶幢光明下有金剛七寶金幢擎瑠璃地其幢八方八楞具足一一方面百寶所成一一寶珠有千光明一一光明八萬四千色映瑠璃地如億千日不可具見鈔三瑠璃下地上莊嚴瑠璃地上以黃金繩雜廁間錯以七寶界分齊分明鈔四一一下寶光樓閤一一寶中有五百色光其光如華又似星月懸處虗空成光明臺樓閣千萬百寶合成鈔五於臺下華幢樂器於臺兩邊各有百億華幢無量樂器以為莊嚴六八種下風樂演法八種清風從光明出鼓此樂器演說苦空無常無我之音疏地下寶柱承擎地上諸相莊嚴以眾寶間錯其地一一寶出雜色光明光明成諸樓觀樓觀兩邊有華幢幢上多有樂器宣說玅音也八種清風者彼處實無時節若寄此八謂除上下餘四方四維故云八亦可用對八卦也鈔疏實無時節等者大本云彼無四時不寒不熱及無日月常有光明寄於此土四方四維有八種風故亦順此對有八風然彼八風不同此土令物生長及以衰落但鼓自然之樂演乎玅法之音耳三是為下結是為水想名第二觀鈔三地觀二初分科疏第三地觀文有四一漸想觀從若得三昧下第二實觀佛告下明利益作是觀下顯觀邪正鈔二隨釋四此想成時一一觀之極令了了閉目開目不令散失唯除食時恒憶此事如此想者名為麤見極樂國地鈔初漸想者轉於冰想用表瑠璃雖復觀地種種莊嚴未稱彼佛勝應所居良以三觀尚微猶兼假想故於彼地名為麤見二若得下實觀若得三昧見彼國地了了分明不可具說是為地想名第三觀鈔玅觀功著三昧有成見彼勝身所依之地莊嚴之相豈可具陳應了同居橫具三土其相非少如諸經說凡小善行迴向求生縱依大乘仍是散善故感安養淨相猶劣若今頓教心觀玅宗所見淨相永異他部如修玅觀於同居穢尚見尊特及實報土豈淨同居身土一槩故今地想玅三昧成見莊嚴事不可具說三佛告下明利益佛告阿難汝持佛語為未來世一切眾生欲脫苦者說是觀地法若觀是地者除八十億劫生死之罪捨身他世必生淨國心得無疑疏前水是想不能滅罪地觀是實故能除斷也鈔疏云前水是想者蓋託此方水成冰事表彼寶地但是假想故名麤見今成三昧實見彼地則名實觀言假想不能滅罪斯是大師順經䇿進令其行者速成三昧非是假想全不滅罪何以知然日觀尚類下品下生滅罪之數豈麤見地全不除𠍴四作此下顯邪正作是觀者名為正觀若他觀者名為邪觀鈔觀與經合則稱性見名為正觀見相乖經是發魔事故名邪觀下去皆然
